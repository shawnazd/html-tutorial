<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Formatting</title>
  </head>
  <body>
    <p><b>This text is bold</b></p>
    <p><i>This text is italic</i></p>
    <p>This is<sub> subscript</sub> and</p>
    <p><sup>superscript</sup></p>
    <p><strong>This is strong</strong></p>
    <p><em>This is emphasized</em></p>
    <p><mark>This is mark</mark></p>
    <p><small>This is small</small></p>
    <p><ins>This is inserted</ins></p>
    <p><del>This is deleted</del></p>
  </body>
</html>
