<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Attributes</title>
  </head>

  <body>
    <!-- ========================= -->
    <!-- HREF ATTRIBUTE EXAMPLE -->
    <!-- ========================= -->
    <h2>Link Example</h2>
    <!-- The href attribute specifies the link destination -->
    <a href="https://www.w3schools.com">Visit W3Schools</a>

    <!-- ========================= -->
    <!-- IMAGE (SRC ATTRIBUTE) -->
    <!-- ========================= -->
    <h2>Image Example</h2>
    <!-- src defines the image path (relative URL) -->
    <!-- width and height define size in pixels -->
    <img src="img_girl.jpg" width="300" height="400" alt="Girl with a jacket" />

    <!-- ========================= -->
    <!-- ALT ATTRIBUTE DEMO -->
    <!-- ========================= -->
    <h2>Broken Image Example</h2>
    <!-- If image is missing, alt text will show -->
    <img src="img_typo.jpg" alt="Image not found - Girl with a jacket" />

    <!-- ========================= -->
    <!-- STYLE ATTRIBUTE -->
    <!-- ========================= -->
    <h2>Style Attribute Example</h2>
    <!-- style is used to add CSS directly -->
    <p style="color: red">This is a red paragraph.</p>

    <!-- ========================= -->
    <!-- TITLE ATTRIBUTE -->
    <!-- ========================= -->
    <h2>Tooltip Example</h2>
    <!-- title shows tooltip on hover -->
    <p title="I'm a tooltip">Hover over this paragraph</p>

    <!-- ========================= -->
    <!-- QUOTES EXAMPLE -->
    <!-- ========================= -->
    <h2>Quotes in Attributes</h2>

    <!-- Using single quotes -->
    <p title='John "ShotGun" Nelson'>Single quote example</p>

    <!-- Using double quotes -->
    <p title="John 'ShotGun' Nelson">Double quote example</p>

    <!-- ========================= -->
    <!-- ABSOLUTE URL EXAMPLE -->
    <!-- ========================= -->
    <h2>Absolute URL Image</h2>
    <!-- This image comes from another website -->
    <img
      src="https://www.w3schools.com/images/img_girl.jpg"
      alt="External Image"
      width="300"
    />

    <!-- ========================= -->
    <!-- RELATIVE URL EXAMPLE -->
    <!-- ========================= -->
    <h2>Relative URL Image</h2>
    <!-- Image from your project folder -->
    <img src="img_girl.jpg" alt="Local Image" width="300" />

    <!-- ========================= -->
    <!-- BEST PRACTICES NOTE -->
    <!-- ========================= -->
    <!-- Always use:
         1. lowercase attribute names
         2. quotes around attribute values
         3. alt attribute for images
    -->
  </body>
</html>
