<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Text Formatting</title>
  </head>
  <body>
    <h1>HTML Text Formatting Examples</h1>

    <!-- Bold text -->
    <p><b>This is bold text</b></p>

    <!-- Emphasized text (important, usually italic) -->
    <p><em>This is emphasized text</em></p>

    <!-- Italic / alternate voice -->
    <p><i>This is italic text</i></p>

    <!-- Smaller text -->
    <p><small>This is small text</small></p>

    <!-- Strong (important, usually bold) -->
    <p><strong>This is strong/important text</strong></p>

    <!-- Subscript (used in chemistry like H2O) -->
    <p>H<sub>2</sub>O</p>

    <!-- Superscript (used in math like x^2) -->
    <p>x<sup>2</sup></p>

    <!-- Inserted text (usually underlined) -->
    <p><ins>This is inserted text</ins></p>

    <!-- Deleted text (strikethrough) -->
    <p><del>This is deleted text</del></p>

    <!-- Highlighted text -->
    <p><mark>This is highlighted text</mark></p>
  </body>
</html>
